# Calls the shared reusable CodeQL workflow (and3rn3t/.github).
# Set `languages` to your project's languages: javascript, typescript, python, swift, etc.
name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: and3rn3t/.github/.github/workflows/reusable-codeql.yml@v1
    with:
      languages: '["python"]'
